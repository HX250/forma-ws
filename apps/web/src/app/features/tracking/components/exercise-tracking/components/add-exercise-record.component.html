<div class="space-y-lg">
  <div class="flex flex-col sm:flex-row gap-md">
    <div class="flex-1">
      <app-page-autocomplete
        [control]="control.exercise.controls.exerciseName"
        [results]="searchResults()"
        [loading]="loading"
        [label]="'TRACKING.EXERCISE.SEARCH_EXERCISE'"
        [placeholder]="'TRACKING.EXERCISE.PLACEHOLDERS.SEARCH'"
        [required]="true"
        [minChars]="2"
        [debounceTime]="300"
        (searchChange)="performSearch()"
        (itemSelected)="exerciseId.set($event.id)"
        (cleared)="onSearchCleared()"
      />
    </div>
    <div class="w-full sm:w-32">
      <app-number-input
        [control]="control.sets"
        [label]="'TRACKING.EXERCISE.SETS'"
      />
    </div>
    <div class="w-full sm:w-32">
      <app-number-input
        [control]="control.reps"
        [label]="'TRACKING.EXERCISE.REPS'"
      />
    </div>
  </div>

  <div class="flex flex-col sm:flex-row gap-md">
    <div class="w-full sm:w-32">
      <app-number-input
        [control]="control.weight"
        [label]="'TRACKING.EXERCISE.WEIGHT'"
      />
    </div>
    <div class="w-full sm:w-32">
      <app-number-input
        [control]="control.duration"
        [label]="'TRACKING.EXERCISE.DURATION_MIN'"
      />
    </div>
    <div class="flex-1">
      <app-page-input
        [control]="control.notes"
        [label]="'TRACKING.EXERCISE.NOTES'"
        [type]="'text'"
      />
    </div>
  </div>

  @if(selectedExercise()) {
  <div
    class="bg-primary dark:bg-primary-dark border rounded-lg p-lg shadow-card"
  >
    <h3
      class="text-sm font-medium text-secondary dark:text-secondary-dark mb-md"
    >
      {{ 'TRACKING.EXERCISE.EXERCISE_DETAILS' | translate }}
    </h3>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-md">
      <div class="flex flex-col">
        <span class="text-xs text-muted dark:text-muted-dark">{{
          'TRACKING.EXERCISE.CATEGORY' | translate
        }}</span>
        <span
          class="text-lg font-semibold text-secondary dark:text-secondary-dark"
        >
          {{ selectedExercise()!.category }}
        </span>
      </div>
      <div class="flex flex-col">
        <span class="text-xs text-muted dark:text-muted-dark">{{
          'TRACKING.EXERCISE.PRIMARY_MUSCLE' | translate
        }}</span>
        <span
          class="text-lg font-semibold text-secondary dark:text-secondary-dark"
        >
          {{ selectedExercise()!.primaryMuscle }}
        </span>
      </div>
    </div>
  </div>
  }

  <div class="flex justify-end pt-md">
    <app-button
      (click)="onSubmit()"
      [loading]="loading"
      [text]="'TRACKING.EXERCISE.LOG_EXERCISE'"
    />
  </div>
</div>
