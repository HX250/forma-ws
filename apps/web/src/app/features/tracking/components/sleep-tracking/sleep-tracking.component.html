<div class="flex flex-col gap-3">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">😴</span>
      <div>
        <p class="text-sm text-muted dark:text-muted-dark">Hours Slept</p>
        <p
          class="text-2xl font-semibold text-secondary dark:text-secondary-dark"
        >
          {{ todayEntry()?.hoursSlept || 0 }}h
        </p>
      </div>
    </div>
    @if(todayEntry()?.sleepQuality) {
    <div class="flex flex-col items-end">
      <p class="text-xs text-muted dark:text-muted-dark">Quality</p>
      <div class="flex gap-1">
        @for(star of [1,2,3,4,5]; track star) {
        <span
          class="text-sm"
          [class.opacity-30]="star > (todayEntry()?.sleepQuality || 0)"
          >⭐</span
        >
        }
      </div>
    </div>
    }
  </div>

  @if(todayEntry()) {
  <div class="text-xs text-muted dark:text-muted-dark">
    🛏️ {{ formatTime(todayEntry()!.bedTime) }} → ⏰
    {{ formatTime(todayEntry()!.wakeTime) }}
  </div>
  } @else {
  <p class="text-xs text-muted dark:text-muted-dark">
    No sleep data logged today
  </p>
  }

  <button
    class="w-full px-3 py-2 rounded-md text-sm border border-secondary/20 bg-primary text-secondary dark:border-secondary-dark/20 dark:bg-primary-dark dark:text-secondary-dark hover:bg-secondary/5 dark:hover:bg-secondary-dark/5 hover:border-accent dark:hover:border-accent-dark transition-all"
  >
    Log Sleep
  </button>
</div>
