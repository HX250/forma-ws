<div class="flex flex-col gap-lg">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
    <div class="flex items-end gap-md">
      <div class="flex flex-col gap-xs w-[180px]">
        <label
          class="text-sm font-medium text-secondary dark:text-secondary-dark"
        >
          {{ 'TRACKING.SLEEP.SLEEP_DATE' | translate }}
        </label>
        <input
          type="date"
          [ngModel]="sleepDate() | date : 'yyyy-MM-dd'"
          (ngModelChange)="onDateChange($event)"
          [max]="today() | date : 'yyyy-MM-dd'"
          [min]="yesterday | date : 'yyyy-MM-dd'"
          class="w-full px-md py-sm rounded-md border border-secondary/20 bg-primary text-secondary dark:border-secondary-dark/20 dark:bg-primary-dark dark:text-secondary-dark focus:ring-2 focus:ring-accent dark:focus:ring-accent-dark transition"
        />
      </div>

      <div class="flex-1">
        <app-page-time-picker
          [control]="control.bedTime"
          [label]="'TRACKING.SLEEP.BED_TIME'"
          [placeholder]="'TRACKING.SLEEP.PLACEHOLDERS.BED_TIME'"
        />
      </div>
    </div>

    <div class="flex items-end gap-md">
      <div class="flex flex-col gap-xs w-[180px]">
        <label
          class="text-sm font-medium text-secondary dark:text-secondary-dark"
        >
          {{ 'TRACKING.SLEEP.WAKE_DATE' | translate }}
        </label>
        <input
          type="date"
          [ngModel]="today() | date : 'yyyy-MM-dd'"
          readonly
          class="w-full px-md py-sm rounded-md border border-secondary/20 bg-secondary/5 text-secondary dark:border-secondary-dark/20 dark:bg-secondary-dark/5 dark:text-secondary-dark cursor-not-allowed"
        />
      </div>

      <div class="flex-1">
        <app-page-time-picker
          [control]="control.wakeTime"
          [label]="'TRACKING.SLEEP.WAKE_TIME'"
          [placeholder]="'TRACKING.SLEEP.PLACEHOLDERS.WAKE_TIME'"
        />
      </div>
    </div>
  </div>

  <div
    class="p-md rounded-lg bg-secondary/5 dark:bg-secondary-dark/5 border border-secondary/10 dark:border-secondary-dark/10"
  >
    <app-page-horizontal-radio
      [control]="control.sleepQuality"
      [options]="ratingOptions()"
      [label]="'TRACKING.SLEEP.SLEEP_QUALITY'"
      [leftLabel]="'TRACKING.SLEEP.QUALITY_LABELS.VERY_POOR' | translate"
      [rightLabel]="'TRACKING.SLEEP.QUALITY_LABELS.EXCELLENT' | translate"
    />
  </div>

  <app-page-input
    [control]="control.notes"
    [label]="'TRACKING.SLEEP.NOTES'"
    [placeholder]="'TRACKING.SLEEP.PLACEHOLDERS.NOTES'"
  />

  <div class="flex justify-end pt-md">
    <app-button
      [variant]="ButtonProperties.ButtonVariant.PRIMARY"
      [size]="ButtonProperties.ButtonSize.MEDIUM"
      [text]="'TRACKING.SLEEP.LOG_SLEEP_ENTRY'"
      [disabled]="form.invalid || isSubmitting()"
      [loading]="isSubmitting()"
      (clicked)="onSubmit()"
    />
  </div>
</div>
