<div class="flex flex-col gap-3">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">💧</span>
      <div>
        <p class="text-sm text-muted dark:text-muted-dark">Water Intake</p>
        <p
          class="text-2xl font-semibold text-secondary dark:text-secondary-dark"
        >
          {{ totalWater() }}L
        </p>
      </div>
    </div>
    <div class="text-xs text-muted dark:text-muted-dark">
      Goal: {{ waterGoal() }}L
    </div>
  </div>

  <!-- Progress Bar -->
  <div
    class="w-full bg-secondary/10 dark:bg-secondary-dark/10 rounded-full h-2"
  >
    <div
      class="bg-accent dark:bg-accent-dark h-2 rounded-full transition-all"
      [style.width.%]="(totalWater() / waterGoal()) * 100"
    ></div>
  </div>

  <div class="flex gap-2">
    <button
      (click)="addWater(0.25)"
      class="flex-1 px-3 py-2 rounded-md text-sm bg-accent/10 text-accent dark:bg-accent-dark/10 dark:text-accent-dark hover:bg-accent/20 dark:hover:bg-accent-dark/20 transition-all"
    >
      +250ml
    </button>
    <button
      (click)="addWater(0.5)"
      class="flex-1 px-3 py-2 rounded-md text-sm bg-accent/10 text-accent dark:bg-accent-dark/10 dark:text-accent-dark hover:bg-accent/20 dark:hover:bg-accent-dark/20 transition-all"
    >
      +500ml
    </button>
  </div>
</div>
