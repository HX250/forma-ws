<app-modal
  [title]="'REGISTER_CLIENT.TITLE'"
  [size]="'lg'"
  [buttonText]="'REGISTER_CLIENT.OPEN_MODAL'"
  [form]="this.form.dirty"
  [showFooterButtons]="false"
  (modalClosed)="onModalClosed()"
>
  <div class="space-y-6">
    <div class="mb-6">
      <app-breadcrumbs
        [items]="breadcrumbItems()"
        [currentStep]="currentStep()"
        [stepValidity]="stepValidity()"
        (stepClick)="onStepClick($event)"
      />
    </div>

    <form class="flex flex-col gap-6">
      @switch (currentStep()) { @case (1) {
      <app-client-personal-info
        [firstName]="form.controls.firstName"
        [lastName]="form.controls.lastName"
        [gender]="form.controls.gender"
        [email]="form.controls.email"
        [birthDate]="form.controls.birthDate"
      />
      } @case (2) {
      <app-client-health-info
        [currentWeight]="form.controls.currentWeight"
        [height]="form.controls.height"
        [activityLevel]="form.controls.activityLevel"
        [medicalConditions]="form.controls.medicalConditions"
        [fitnessExperience]="form.controls.fitnessExperience"
      />
      } @case (3) {
      <app-client-permissions-info
        [canTrackExercise]="form.controls.canTrackExercise"
        [canTrackSleep]="form.controls.canTrackSleep"
        [canTrackNutrition]="form.controls.canTrackNutrition"
        [canTrackWater]="form.controls.canTrackWater"
      />
      } }

      <div
        class="flex justify-between gap-4 mt-6 pt-6 border-t border-secondary/20 dark:border-secondary-dark/20"
      >
        <div>
          @if (canGoPrevious()) {
          <app-button
            [text]="'REGISTER_CLIENT.PREVIOUS'"
            [variant]="ButtonProperties.ButtonVariant.SECONDARY"
            (clicked)="previousStep()"
          />
          }
        </div>

        <p class="text-sm text-muted dark:text-muted-dark">
          {{ 'REGISTER_CLIENT.COACH_AUTO_ASSIGNED' | translate }}
        </p>

        <div class="flex gap-4">
          @if (!isLastStep()) {
          <app-button
            [text]="'REGISTER_CLIENT.NEXT'"
            [variant]="ButtonProperties.ButtonVariant.PRIMARY"
            [disabled]="!canGoNext()"
            (clicked)="nextStep()"
          />
          } @else {
          <app-button
            [text]="'REGISTER_CLIENT.REGISTER_BUTTON'"
            [loading]="form.formLoader()"
            [variant]="ButtonProperties.ButtonVariant.PRIMARY"
            [disabled]="form.invalid"
            (clicked)="onSubmit()"
          />
          }
        </div>
      </div>
    </form>
  </div>
</app-modal>
