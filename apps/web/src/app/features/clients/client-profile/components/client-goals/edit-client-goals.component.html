<div class="space-y-lg">
  <div>
    <app-page-horizontal-select
      [label]="'CLIENT_PROFILE.GOALS.GOAL_TYPE'"
      [control]="control.goalType"
      [options]="goalTypeOptions"
    />
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-sm"></div>
  </div>

  <div
    class="bg-primary dark:bg-primary-dark border border-border dark:border-border-dark rounded-lg p-lg shadow-card"
  >
    <h3
      class="text-sm font-medium text-secondary dark:text-secondary-dark mb-md"
    >
      {{ 'CLIENT_PROFILE.GOALS.GENERAL_GOALS' | translate }}
    </h3>
    <div class="flex flex-col sm:flex-row gap-md">
      <div class="flex-1">
        <app-number-input
          [control]="form.controls.targetWeight"
          [label]="'CLIENT_PROFILE.GOALS.TARGET_WEIGHT'"
          [step]="0.1"
        />
      </div>
      <div class="flex-1">
        <app-date-input
          [control]="form.controls.targetDate"
          [label]="'CLIENT_PROFILE.GOALS.TARGET_DATE'"
          [stylingClass]="
            'w-full px-3 text-base text-primary-dark dark:text-primary bg-primary dark:bg-primary-dark border border-secondary dark:border-secondary-dark rounded-md shadow-sm placeholder:text-muted dark:placeholder:text-muted-dark focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent disabled:bg-muted dark:disabled:bg-muted-dark disabled:text-muted dark:disabled:text-muted-dark disabled:cursor-not-allowed readonly:bg-secondary dark:readonly:bg-secondary-dark readonly:cursor-default transition-colors duration-200'
          "
        />
      </div>
      <div class="flex-1">
        <app-number-input
          [control]="form.controls.weightGoal"
          [label]="'CLIENT_PROFILE.GOALS.WEEKLY_WEIGHT_GOAL'"
          [step]="0.1"
        />
      </div>
    </div>
  </div>

  <div
    class="bg-primary dark:bg-primary-dark border border-border dark:border-border-dark rounded-lg p-lg shadow-card"
  >
    <h3
      class="text-sm font-medium text-secondary dark:text-secondary-dark mb-md"
    >
      {{ 'CLIENT_PROFILE.GOALS.NUTRITION_GOALS' | translate }}
    </h3>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-md">
      <div>
        <app-number-input
          [control]="form.controls.caloriesGoal"
          [label]="'CLIENT_PROFILE.GOALS.CALORIES'"
          [step]="0.1"
        />
      </div>
      <div>
        <app-number-input
          [control]="form.controls.proteinTarget"
          [label]="'CLIENT_PROFILE.GOALS.PROTEIN'"
          [step]="0.1"
        />
      </div>
      <div>
        <app-number-input
          [control]="form.controls.carbTarget"
          [label]="'CLIENT_PROFILE.GOALS.CARBS'"
          [step]="0.1"
        />
      </div>
      <div>
        <app-number-input
          [control]="form.controls.fatTarget"
          [label]="'CLIENT_PROFILE.GOALS.FAT'"
          [step]="0.1"
        />
      </div>
      <div>
        <app-number-input
          [control]="form.controls.fiberTarget"
          [label]="'CLIENT_PROFILE.GOALS.FIBER'"
          [step]="0.1"
        />
      </div>
      <div>
        <app-number-input
          [control]="form.controls.sugarTarget"
          [label]="'CLIENT_PROFILE.GOALS.SUGAR'"
          [step]="0.1"
        />
      </div>
    </div>
  </div>

  <div
    class="bg-primary dark:bg-primary-dark border border-border dark:border-border-dark rounded-lg p-lg shadow-card"
  >
    <h3
      class="text-sm font-medium text-secondary dark:text-secondary-dark mb-md"
    >
      {{ 'CLIENT_PROFILE.GOALS.DAILY_TRACKING_GOALS' | translate }}
    </h3>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-md">
      <div>
        <app-number-input
          [control]="form.controls.sleepGoal"
          [label]="'CLIENT_PROFILE.GOALS.SLEEP'"
          [step]="0.1"
        />
      </div>
      <div>
        <app-number-input
          [control]="form.controls.waterGoal"
          [label]="'CLIENT_PROFILE.GOALS.WATER'"
          [step]="0.1"
        />
      </div>
      <div>
        <app-number-input
          [control]="form.controls.exerciseGoal"
          [label]="'CLIENT_PROFILE.GOALS.EXERCISE'"
          [step]="0.1"
        />
      </div>
    </div>
  </div>

  <div class="flex justify-end gap-md pt-md">
    <app-button
      (click)="cancel()"
      [text]="'CLIENT_PROFILE.GOALS.CANCEL'"
      [variant]="ButtonProperties.ButtonVariant.PRIMARY"
    />
    <app-button
      (click)="save()"
      [loading]="form.formLoader()"
      [disabled]="form.invalid"
      [text]="'CLIENT_PROFILE.GOALS.SAVE'"
    />
  </div>
</div>
