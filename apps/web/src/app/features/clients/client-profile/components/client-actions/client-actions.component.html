<app-action-menu>
  <button
    type="button"
    class="w-full text-left px-4 py-2 text-sm transition-colors duration-150 flex items-center gap-3 hover:bg-secondary/10 dark:hover:bg-secondary-dark/10 text-secondary dark:text-secondary-dark"
    (click)="onSetClientGoals()"
  >
    <span class="material-icons text-base">flag</span>
    <span>{{
      'CLIENT_PROFILE.CLIENT_ACTIONS.SET_CLIENT_GOALS' | translate
    }}</span>
  </button>

  <div
    class="my-1 border-t border-secondary/20 dark:border-secondary-dark/20"
  ></div>

  <button
    type="button"
    class="w-full text-left px-4 py-2 text-sm transition-colors duration-150 flex items-center gap-3 hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 dark:text-red-400"
    (click)="onDeleteClient()"
  >
    <span class="material-icons text-base">delete</span>
    <span>{{ 'CLIENT_PROFILE.CLIENT_ACTIONS.DELETE_CLIENT' | translate }}</span>
  </button>
</app-action-menu>
