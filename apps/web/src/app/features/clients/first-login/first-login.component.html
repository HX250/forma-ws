<div
  class="flex items-center justify-center p-4 bg-primary dark:bg-primary-dark"
>
  <div class="w-full max-w-md">
    <div
      class="rounded-lg border border-secondary/20 bg-primary p-6 dark:border-secondary-dark/20 dark:bg-primary-dark shadow-card"
    >
      <h1
        class="text-2xl font-heading font-semibold text-secondary dark:text-secondary-dark mb-2"
      >
        We recommend changing your password
      </h1>
      <p class="text-sm text-muted dark:text-muted-dark mb-6">
        For security reasons, please set a new password for your account.
      </p>

      <div class="mb-6">
        <app-page-input
          [control]="form.controls.newPassword"
          [label]="'New password'"
        />
      </div>

      <div class="flex flex-col gap-3">
        <button
          (click)="changePassword()"
          class="w-full px-4 py-3 rounded-md bg-accent dark:bg-accent-dark text-inverse dark:text-inverse-dark font-medium hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-accent dark:focus:ring-accent-dark transition-all"
        >
          Change Password
        </button>
      </div>
    </div>
  </div>
</div>
