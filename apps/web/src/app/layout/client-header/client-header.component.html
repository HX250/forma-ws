<header
  class="sticky top-0 z-50 w-full border-b border-secondary/20 bg-primary dark:border-secondary-dark/20 dark:bg-primary-dark"
>
  <div class="flex h-16 items-center justify-between px-4 md:px-6">
    <div class="flex items-center gap-3">
      <div
        class="flex h-10 w-10 items-center justify-center rounded-lg bg-accent text-primary dark:bg-accent-dark dark:text-primary-dark"
      >
        <span class="text-xl font-bold">F</span>
      </div>
      <span class="text-xl font-bold text-secondary dark:text-secondary-dark"
        >Forma</span
      >
    </div>

    <app-shared-nav 
      [navLinks]="navLinks"
      [isMobileMenuOpen]="isMobileMenuOpen()"
      [currentUser]="currentUser()"
      (closeMenu)="closeMobileMenu()"
      (toggleMenu)="toggleMobileMenu()"
      (logoutClick)="logout()"
    ></app-shared-nav>

    <div class="hidden items-center gap-2 md:flex">
      <button
        (click)="navigateAndClose('/profile')"
        class="flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium text-secondary transition-colors hover:bg-secondary/10 dark:text-secondary-dark dark:hover:bg-secondary-dark/10"
      >
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-accent text-primary dark:bg-accent-dark dark:text-primary-dark"
        >
          <span class="text-sm font-semibold">
            {{ currentUser().firstName.charAt(0).toUpperCase() || 'U' }}
          </span>
        </div>
        <span class="max-w-[120px] truncate">{{
          currentUser() | userFullName
        }}</span>
      </button>
      <button
        (click)="logout()"
        class="rounded-md bg-secondary px-4 py-2 text-sm font-medium text-primary transition-colors hover:bg-secondary/80 dark:bg-secondary-dark dark:text-primary-dark dark:hover:bg-secondary-dark/80"
      >
        {{ 'HEADER.LOGOUT' | translate }}
      </button>
    </div>

    <button
      (click)="toggleMobileMenu()"
      class="flex h-10 w-10 items-center justify-center rounded-md text-secondary transition-colors hover:bg-secondary/10 dark:text-secondary-dark dark:hover:bg-secondary-dark/10 md:hidden"
      [attr.aria-label]="isMobileMenuOpen() ? 'Close menu' : 'Open menu'"
    >
      <svg
        class="h-6 w-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>
  </div>
</header>
