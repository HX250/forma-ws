<nav
  class="flex flex-col md:flex-row justify-between items-center space-y-2 md:space-y-0 space-x-0 md:space-x-2"
  aria-label="Breadcrumb"
>
  @for (item of items(); track item.step) { @if (!isFirst(item.step)) {
  <svg
    class="h-5 w-5 text-secondary dark:text-secondary-dark my-2 md:my-0 mx-0 md:mx-2 rotate-90 md:rotate-0"
    fill="currentColor"
    viewBox="0 0 20 20"
    aria-hidden="true"
  >
    <path
      fill-rule="evenodd"
      d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
      clip-rule="evenodd"
    />
  </svg>
  }
  <div class="flex items-center">
    <button
      type="button"
      (click)="onStepClick(item.step, $event)"
      [class]="getBreadcrumbClass(item.step)"
      [attr.aria-current]="isActive(item.step) ? 'page' : null"
    >
      <span class="flex items-center gap-2">
        @if (isCompleted(item.step)) {
        <svg
          class="h-4 w-4 text-accent dark:text-accent-dark"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
            clip-rule="evenodd"
          />
        </svg>
        } @else {
        <span
          class="flex h-6 w-6 items-center justify-center rounded-full border-2 font-semibold text-sm"
          [class]="getStepNumberClass(item.step)"
        >
          {{ item.step }}
        </span>
        }
        <span>{{ item.label | translate }}</span>
      </span>
    </button>
  </div>
  }
</nav>
