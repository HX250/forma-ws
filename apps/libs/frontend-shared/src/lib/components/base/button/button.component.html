<button
  class="{{ buttonClass() }}"
  [attr.type]="type()"
  [disabled]="disabled() || loading()"
  (click)="onClick($event)"
>
  @if(icon() || loading()) {
  <span class="mr-2 inline-flex items-center">
    <svg
      *ngIf="loading(); else iconTpl"
      class="h-4 w-4 animate-spin text-current"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      />
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
      />
    </svg>
    <ng-template #iconTpl>
      <span class="h-4 w-4 text-current" [class.hidden]="!icon()">{{
        icon()
      }}</span>
    </ng-template>
  </span>
  }

  <span class="inline-flex items-center">
    {{ text() | translate }}
  </span>
</button>
