<div class="flex flex-col gap-1">
  @if (label()) {
  <label
    class="block text-sm py-2 font-medium text-secondary dark:text-secondary-dark"
  >
    {{ label() | translate }}
    @if (isRequired()) {
    <span class="text-utils-error">*</span>
    }
  </label>
  }
  <input
    type="time"
    [formControl]="control()"
    [placeholder]="placeholder() | translate"
    class="w-full px-3 py-2 text-base text-primary-dark dark:text-primary bg-primary dark:bg-primary-dark border border-secondary dark:border-secondary-dark rounded-md shadow-sm placeholder:text-muted dark:placeholder:text-muted-dark focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent disabled:bg-muted dark:disabled:bg-muted-dark disabled:text-muted dark:disabled:text-muted-dark disabled:cursor-not-allowed transition-colors duration-200"
    [class.border-utils-error]="control().invalid && control().touched"
    [class.dark:border-utils-error]="control().invalid && control().touched"
    [class.focus:ring-utils-error]="control().invalid && control().touched"
    [class.focus:border-utils-error]="control().invalid && control().touched"
  />
  @if ((control().invalid && control().touched) && control().errors) {
  <div class="text-sm py-2 text-utils-error">
    @if (control().errors?.['required']) {
    <span>{{ 'COMPONENTS.FORM.ERRORS.REQUIRED' | translate }}</span>
    } @if (control().errors?.['dateAfterTargetDate']) {
    <span>Date after required</span>
    }
  </div>
  }
</div>
