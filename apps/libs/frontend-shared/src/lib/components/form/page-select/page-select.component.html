<div class="space-y-2">
  @if (label()) {
  <label class="block text-sm font-medium text-primary-dark dark:text-primary">
    {{ label() }}
    @if (required()) {
    <span class="text-alert-error-text dark:text-alert-error-text-dark">*</span>
    }
  </label>
  }

  <div class="relative">
    <select
      class="w-full px-3 py-2 text-base text-primary-dark dark:text-primary bg-bg-primary dark:bg-bg-primary-dark border border-neutral-300 dark:border-neutral-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-accent-500 disabled:bg-bg-muted dark:disabled:bg-bg-muted-dark disabled:text-muted dark:disabled:text-muted-dark disabled:cursor-not-allowed transition-colors duration-200"
      [multiple]="multiple()"
      [disabled]="disabled()"
      [formControl]="control()"
      (change)="onSelect($event)"
      [required]="required()"
    >
      <ng-container *ngFor="let item of items()">
        <option [value]="item.value" [selected]="isSelected(item)">
          {{ item.label }}
        </option>
      </ng-container>
    </select>
  </div>

  @if (control().touched && control().errors) {
  <div class="text-sm text-alert-error-text dark:text-alert-error-text-dark">
    @if (control().errors?.['required']) {
    <span>This field is required</span>
    }
  </div>
  }
</div>
