<div class="space-y-2">
  @if (label()) {
  <label
    class="block text-sm font-medium text-secondary dark:text-secondary-dark"
  >
    {{ label() }}
    @if (required()) {
    <span class="text-utils-error">*</span>
    }
  </label>
  }

  <div class="relative">
    <select
      class="w-full px-3 py-2 text-base text-primary-dark dark:text-primary bg-primary dark:bg-primary-dark border border-secondary dark:border-secondary-dark rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent disabled:bg-muted dark:disabled:bg-muted-dark disabled:text-muted dark:disabled:text-muted-dark disabled:cursor-not-allowed transition-colors duration-200"
      [multiple]="multiple()"
      [disabled]="disabled()"
      [formControl]="control()"
      (change)="onSelect($event)"
      [required]="required()"
    >
      @for(item of items(); track item.value) {
      <ng-container>
        <option [value]="item.value" [selected]="isSelected(item)">
          {{ item.label }}
        </option>
      </ng-container>
      }
    </select>
  </div>

  @if (control().touched && control().errors) {
  <div class="text-sm text-utils-error">
    @if (control().errors?.['required']) {
    <span>This field is required</span>
    }
  </div>
  }
</div>
