<div class="flex flex-col gap-4">
  <label>{{ label() | translate }}</label>
  <div class="flex flex-wrap justify-between gap-sm">
    @for (option of options(); track option.value) {
    <button
      type="button"
      (click)="toggle(option.value)"
      class="px-md py-sm rounded-full text-sm font-medium transition-all border shadow-card"
      [class.bg-accent]="isSelected(option.value)()"
      [class.text-inverse]="isSelected(option.value)()"
      [class.border-accent]="isSelected(option.value)()"
      [class.bg-primary]="!isSelected(option.value)()"
      [class.text-secondary]="!isSelected(option.value)()"
      [class.border-muted]="!isSelected(option.value)()"
    >
      {{ option.label }}
    </button>
    }
  </div>
</div>
