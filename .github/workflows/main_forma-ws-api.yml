name: Build and deploy Forma to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for schema changes and run migrations
        id: check-schema
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep "apps/api/prisma/schema.prisma"; then
            echo "::notice title=Prisma Schema Change::Changes detected in Prisma schema. Running migrations and generating client."
            npm install prisma
            npx prisma migrate deploy --schema=./apps/api/prisma/schema.prisma
            npx prisma generate --schema=./apps/api/prisma/schema.prisma
            echo "schema_changed=true" >> $GITHUB_OUTPUT
          else
            echo "::notice title=No Schema Change::No changes detected in Prisma schema. Skipping migration."
            echo "schema_changed=false" >> $GITHUB_OUTPUT
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build all projects
        run: |
          npx nx build api --prod
          npx nx build web --prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy NestJS API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'forma-ws-api'
          slot-name: 'Production'
          package: ./dist/apps/api
        env:
          NODE_ENV: 'production'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN }}

      - name: Deploy Angular App to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/dist/apps/web/browser'
          api_location: ''
          output_location: ''
          skip_app_build: true
