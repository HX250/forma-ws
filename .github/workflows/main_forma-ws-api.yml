name: Build and deploy Node.js app to Azure Web App - forma-ws-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  nx-cloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npx nx run-many -t lint test build
      - run: npx nx fix-ci
        if: always()

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build NestJS API with Nx
        run: npx nx build api --prod

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy

          cp -r dist/apps/api/* deploy/

          cp package*.json deploy/

          cp -r apps/api/prisma deploy/

          mkdir -p deploy/node_modules/.prisma
          cp -r node_modules/.prisma/client deploy/node_modules/.prisma/

      - name: Install production dependencies
        run: |
          cd deploy
          npm ci --only=production --legacy-peer-deps

      - name: Zip artifact for deployment
        run: |
          cd deploy
          zip -r ../release.zip ./*

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'forma-ws-api'
          slot-name: 'Production'
          package: .
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
