name: Build and deploy Node.js app to Azure Web App - forma-ws-api

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'libs/**'
      - 'package*.json'
      - 'nx.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build NestJS API with Nx
        run: npx nx build api --prod

      - name: Copy necessary files to dist
        run: |
          cp package*.json dist/apps/api/
          cp -r apps/api/prisma dist/apps/api/
          mkdir -p dist/apps/api/node_modules/.prisma
          cp -r node_modules/.prisma/client dist/apps/api/node_modules/.prisma/

      - name: Install production dependencies in dist
        run: |
          cd dist/apps/api
          npm ci --only=production

      - name: Zip artifact for deployment
        run: |
          cd dist/apps/api
          zip -r ../../../release.zip ./*

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'forma-ws-api'
          slot-name: 'Production'
          package: .
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
