name: Build and deploy NestJS and Angular app to Azure - Forma

on:
  push:
    branches:
      - main

jobs:
  database-migration-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for schema changes
        id: check-schema
        run: |
          if git diff --name-only HEAD^ HEAD | grep "apps/api/prisma/schema.prisma"; then
            echo "schema_changed=true" >> $GITHUB_OUTPUT
          else
            echo "schema_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Prisma CLI
        if: steps.check-schema.outputs.schema_changed == 'true'
        run: npm install prisma

      - name: Run Prisma Migrations
        if: steps.check-schema.outputs.schema_changed == 'true'
        run: npx prisma migrate deploy --schema=./apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma Client
        if: steps.check-schema.outputs.schema_changed == 'true'
        run: npx prisma generate --schema=./apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-and-deploy-backend:
    runs-on: ubuntu-latest
    needs: database-migration-and-generate
    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build NestJS API with Nx
        run: npx nx build api --prod

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy
          cp -r dist/apps/api/* deploy/
          cp package*.json deploy/
          cp -r apps/api/prisma deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'forma-ws-api'
          slot-name: 'Production'
          package: ./deploy
        env:
          NODE_ENV: 'production'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN }}

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    needs: database-migration-and-generate

    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular app with Nx
        run: npx nx build web --prod

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './dist/apps/web/browser'
          api_location: ''
          output_location: ''
          skip_app_build: true
        env:
          API_END_POINT: ${{ secrets.API_END_POINT }}
