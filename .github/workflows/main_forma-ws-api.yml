name: Build and deploy NestJS and Angular app to Azure - Forma

on:
  push:
    branches:
      - main

jobs:
  database-migration-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for schema changes
        id: check-schema
        run: |
          if git diff --name-only HEAD^ HEAD | grep "apps/api/prisma/schema.prisma"; then
            echo "schema_changed=true" >> $GITHUB_OUTPUT
          else
            echo "schema_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Prisma CLI
        if: steps.check-schema.outputs.schema_changed == 'true'
        run: npm install prisma

      - name: Run Prisma Migrations
        if: steps.check-schema.outputs.schema_changed == 'true'
        run: npx prisma migrate deploy --schema=./apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma Client
        if: steps.check-schema.outputs.schema_changed == 'true'
        run: npx prisma generate --schema=./apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  sync-prod-migration-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Prisma CLI
        run: npm install prisma

      - name: Mark Initial Migration as Applied
        run: npx prisma migrate resolve --applied "20250803152932_init" --schema=./apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-backend:
    runs-on: ubuntu-latest
    needs: database-migration-and-generate
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build NestJS API with Nx
        run: npx nx build api --prod

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy

          cp -r dist/apps/api/* deploy/
          cp package*.json deploy/
          cp -r apps/api/prisma deploy/

          cd deploy
          npm install --production

      - name: Zip artifact for deployment
        run: |
          cd deploy
          zip -r ../release.zip ./*

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js for deployment
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'forma-ws-api'
          slot-name: 'Production'
          package: .
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: database-migration-and-generate
    steps:
      - uses: actions/checkout@v4

      - run: npm ci --legacy-peer-deps

      - name: Build Angular app with Nx
        run: npx nx build web --prod

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/apps/web/browser

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '.'
          api_location: ''
          output_location: ''
          skip_app_build: true
