name: Build and deploy NestJS and Angular app to Azure - Forma

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-api:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend API
    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for schema.prisma changes
        id: check_schema_changes
        run: |
          if git diff --quiet HEAD^ apps/api/prisma/schema.prisma; then
            echo "No changes to schema.prisma detected."
            echo "changes_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes to schema.prisma detected. Migrating database."
            echo "changes_found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Prisma Migrations
        if: steps.check_schema_changes.outputs.changes_found == 'true'
        run: |
          npx prisma migrate deploy --schema=./apps/api/prisma/schema.prisma
          npx prisma generate --schema=./apps/api/prisma/schema.prisma
        working-directory: .
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build NestJS API with Nx
        run: npx nx build api --prod

      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p deploy/api

          cp -r dist/apps/api/* deploy/api/

          cp package.json deploy/api/

          npm ci --only=production --prefix deploy/api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'forma-ws-api'
          slot-name: 'Production'
          package: './deploy/api'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-deploy-api
    name: Build and Deploy Frontend
    permissions:
      id-token: write
      contents: read

    environment:
      name: 'Production'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js and Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular Frontend with Nx
        run: npx nx build web --prod

      - name: Build NestJS API with Nx
        run: npx nx build api --prod

      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p deploy/api
          cp -r dist/apps/api/* deploy/api/
          npm ci --only=production --prefix deploy/api
          npx prisma generate --schema=./apps/api/prisma/schema.prisma --output=./deploy/api/node_modules/@prisma/client

      - name: Build and Deploy Frontend to Static Web App
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'apps/web'
          api_location: 'deploy/api'
          output_location: 'dist/apps/web/browser'
          skip_app_build: true
          skip_api_build: true
